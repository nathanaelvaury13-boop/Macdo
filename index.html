<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Borne McDonald's • Commande Officielle</title>
    <style>
        :root {
            --mcd-green: #004731;
            --mcd-gold: #FFC72C;
            --mcd-bg: #F5F5F5;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: var(--mcd-bg);
            margin: 0;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        .mcd-logo { height: 48px; }

        #update-loader {
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, var(--mcd-green), #003322);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            transition: transform 0.6s ease;
        }

        .spin-m {
            font-size: 110px;
            color: var(--mcd-gold);
            font-weight: 900;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.18); } }

        .skip-btn {
            margin-top: 30px;
            padding: 12px 28px;
            background: rgba(255,255,255,0.2);
            border: 2px solid var(--mcd-gold);
            color: white;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
        }

        header {
            background: var(--mcd-green);
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .points-pill {
            background: rgba(255,255,255,0.15);
            border: 2px solid var(--mcd-gold);
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: 700;
            color: var(--mcd-gold);
        }

        .sidebar {
            width: 180px;
            background: white;
            border-right: 1px solid #ddd;
            overflow-y: auto;
        }

        .nav-button {
            padding: 22px 15px;
            text-align: center;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .nav-button.active {
            background: #fff9e6;
            border-left: 8px solid var(--mcd-gold);
        }

        .nav-button img { width: 52px; height: 52px; object-fit: contain; }

        .main-layout { display: flex; height: calc(100vh - 170px); }

        .grid {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 20px;
            background: white;
        }

        .item-card {
            border: 1px solid #eee;
            border-radius: 18px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s;
            position: relative;
        }

        .item-card:hover {
            transform: translateY(-6px);
            border-color: var(--mcd-gold);
            box-shadow: 0 10px 25px rgba(255,199,44,0.3);
        }

        .item-card img {
            width: 100%;
            max-height: 165px;
            object-fit: contain;
            border-radius: 12px;
        }

        .item-card .name { font-weight: 700; margin: 12px 0 6px; min-height: 42px; }
        .item-card .price { color: var(--mcd-green); font-weight: 900; font-size: 1.35rem; }

        footer {
            height: 110px;
            background: var(--mcd-green);
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            color: white;
            z-index: 1000;
        }

        .checkout-btn {
            background: var(--mcd-gold);
            color: var(--mcd-green);
            padding: 18px 55px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1.35rem;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- LOADER -->
    <div id="update-loader">
        <div class="spin-m">M</div>
        <div id="msg" style="font-size:1.5rem; font-weight:700; margin:15px 0;">Connexion à la borne McDonald's...</div>
        <p style="opacity:0.8;">Synchronisation des +80 produits • Avril 2026</p>
        
        <div style="width:260px; height:6px; background:rgba(255,255,255,0.3); border-radius:3px; margin:25px 0; overflow:hidden;">
            <div id="progress" style="width:0%; height:100%; background:#FFC72C; transition:width 3s linear;"></div>
        </div>
        
        <button class="skip-btn" onclick="forceSkipLoader()">Passer la synchronisation</button>
    </div>

    <!-- HEADER -->
    <header>
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/McDonald%27s_logo.svg/512px-McDonald%27s_logo.svg.png" alt="McDonald's" class="mcd-logo">
        <div class="points-pill">⭐ <span id="p-count">312</span> points</div>
    </header>

    <div class="main-layout">
        <nav class="sidebar">
            <div class="nav-button active" onclick="updateView('menu', this)"><img src="https://www.mcdonalds.com/is/image/content/dam/usa/nfl/nutrition/items/regular/hero/desktop/Big_Mac.png?\( Product_Desktop \)"><span>Menus</span></div>
            <div class="nav-button" onclick="updateView('burger', this)"><img src="https://www.mcdonalds.com/is/image/content/dam/usa/nfl/nutrition/items/regular/hero/desktop/Double_Cheeseburger.png?\( Product_Desktop \)"><span>Burgers</span></div>
            <div class="nav-button" onclick="updateView('chicken', this)"><img src="https://www.mcdonalds.com/is/image/content/dam/usa/nfl/nutrition/items/regular/hero/desktop/Chicken_McNuggets.png?\( Product_Desktop \)"><span>Poulet & Poisson</span></div>
            <div class="nav-button" onclick="updateView('side', this)"><img src="https://www.mcdonalds.com/is/image/content/dam/usa/nfl/nutrition/items/regular/hero/desktop/French_Fries.png?\( Product_Desktop \)"><span>Accompagnements</span></div>
            <div class="nav-button" onclick="updateView('drink', this)"><img src="https://www.mcdonalds.com/is/image/content/dam/usa/nfl/nutrition/items/regular/hero/desktop/Big_Mac.png?\( Product_Desktop \)"><span>Boissons</span></div>
            <div class="nav-button" onclick="updateView('dessert', this)"><img src="https://www.mcdonalds.com/is/image/content/dam/usa/nfl/nutrition/items/regular/hero/desktop/McFlurry_Oreo.png?\( Product_Desktop \)"><span>Desserts</span></div>
            <div class="nav-button" onclick="updateView('mccafe', this)"><img src="https://www.mcdonalds.com/is/image/content/dam/usa/nfl/nutrition/items/regular/hero/desktop/Big_Mac.png?\( Product_Desktop \)"><span>McCafé</span></div>
            <div class="nav-button" onclick="updateView('promo', this)"><img src="https://www.mcdonalds.com/is/image/content/dam/usa/nfl/nutrition/items/regular/hero/desktop/Big_Mac.png?\( Product_Desktop \)"><span>Promo</span></div>
        </nav>

        <main class="grid" id="product-grid"></main>
    </div>

    <footer>
        <div onclick="showCart()" style="cursor:pointer;">
            <div style="font-size:0.85rem; opacity:0.85;">TOTAL</div>
            <div style="font-size:2.1rem; font-weight:900;"><span id="sum">0.00</span> €</div>
        </div>
        <button class="checkout-btn" onclick="pay()">PAYER • <span id="item-count">0</span></button>
    </footer>

    <!-- MODALS (Paiement + Panier) -->
    <div id="payment-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:10000; align-items:center; justify-content:center;">
        <div style="background:white; width:92%; max-width:420px; border-radius:20px; overflow:hidden;">
            <div style="background:var(--mcd-green); color:white; padding:20px; text-align:center; font-size:1.4rem; font-weight:700;">Paiement Sécurisé</div>
            <div style="padding:25px;">
                <h3 style="text-align:center;">Total : <span id="modal-total">0.00</span> €</h3>
                <!-- Formulaire carte -->
                <input type="text" id="card-number" placeholder="4242 4242 4242 4242" style="width:100%; padding:14px; margin:10px 0; border-radius:12px; border:2px solid #ddd;" oninput="formatCardNumber(this)">
                <div style="display:flex; gap:10px;">
                    <input type="text" id="expiry" placeholder="MM/AA" maxlength="5" style="flex:1; padding:14px; border-radius:12px; border:2px solid #ddd;" oninput="formatExpiry(this)">
                    <input type="text" id="cvv" placeholder="CVV" maxlength="4" style="flex:1; padding:14px; border-radius:12px; border:2px solid #ddd;">
                </div>
                <button onclick="processPayment()" id="pay-btn" style="width:100%; margin-top:20px; background:var(--mcd-green); color:white; padding:18px; border:none; border-radius:50px; font-size:1.3rem; font-weight:900;">PAYER MAINTENANT</button>
            </div>
        </div>
    </div>

    <script>
        const products = [
            // Menus
            { name: "Menu Big Mac™ Best Of", cat: "menu", price: 11.80, img: "https://www.mcdonalds.com/is/image/content/dam/usa/nfl/nutrition/items/regular/hero/desktop/Big_Mac.png?\( Product_Desktop \)" },
            { name: "Menu McChicken™ Best Of", cat: "menu", price: 11.70, img: "https://www.mcdonalds.com/is/image/content/dam/usa/nfl/nutrition/items/regular/hero/desktop/McChicken.png?\( Product_Desktop \)" },
            { name: "Menu Royal Cheese™ Best Of", cat: "menu", price: 12.10, img: "https://www.mcdonalds.com/is/image/content/dam/usa/nfl/nutrition/items/regular/hero/desktop/Double_Cheeseburger.png?\( Product_Desktop \)" },
            { name: "Menu Super Mario Galaxy", cat: "menu", price: 13.90, img: "https://www.mcdonalds.com/is/image/content/dam/usa/nfl/nutrition/items/regular/hero/desktop/Big_Mac.png?\( Product_Desktop \)" },
            // Burgers
            { name: "Big Mac™", cat: "burger", price: 6.20, img: "https://www.mcdonalds.com/is/image/content/dam/usa/nfl/nutrition/items/regular/hero/desktop/Big_Mac.png?\( Product_Desktop \)" },
            { name: "Double Cheeseburger", cat: "burger", price: 4.80, img: "https://www.mcdonalds.com/is/image/content/dam/usa/nfl/nutrition/items/regular/hero/desktop/Double_Cheeseburger.png?\( Product_Desktop \)" },
            { name: "McChicken™", cat: "burger", price: 5.70, img: "https://www.mcdonalds.com/is/image/content/dam/usa/nfl/nutrition/items/regular/hero/desktop/McChicken.png?\( Product_Desktop \)" },
            { name: "Royal Cheese™", cat: "burger", price: 6.50, img: "https://www.mcdonalds.com/is/image/content/dam/usa/nfl/nutrition/items/regular/hero/desktop/Double_Cheeseburger.png?\( Product_Desktop \)" },
            // Ajoute d'autres produits ici si tu veux encore plus...
            { name: "6 McNuggets", cat: "chicken", price: 4.90, img: "https://www.mcdonalds.com/is/image/content/dam/usa/nfl/nutrition/items/regular/hero/desktop/Chicken_McNuggets.png?\( Product_Desktop \)" },
            { name: "Frites Moyennes", cat: "side", price: 3.20, img: "https://www.mcdonalds.com/is/image/content/dam/usa/nfl/nutrition/items/regular/hero/desktop/French_Fries.png?\( Product_Desktop \)" },
            { name: "Coca-Cola", cat: "drink", price: 2.95, img: "https://www.mcdonalds.com/is/image/content/dam/usa/nfl/nutrition/items/regular/hero/desktop/Big_Mac.png?\( Product_Desktop \)" },
            { name: "McFlurry Oreo", cat: "dessert", price: 3.90, img: "https://www.mcdonalds.com/is/image/content/dam/usa/nfl/nutrition/items/regular/hero/desktop/McFlurry_Oreo.png?\( Product_Desktop \)" }
        ];

        let cart = [];
        let myPoints = 312;

        function forceSkipLoader() {
            document.getElementById('update-loader').style.transform = "translateY(-100%)";
            loadGrid('menu');
        }

        window.addEventListener('load', () => {
            let percent = 0;
            const progress = document.getElementById('progress');
            const text = document.getElementById('msg');

            const interval = setInterval(() => {
                percent += Math.random() * 12;
                if (percent > 100) percent = 100;
                progress.style.width = percent + "%";

                if (percent > 40) text.innerText = "Chargement des menus...";
                if (percent > 75) text.innerText = "Photos officielles...";

                if (percent >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        document.getElementById('update-loader').style.transform = "translateY(-100%)";
                        loadGrid('menu');
                    }, 300);
                }
            }, 90);

            // Sécurité GitHub Pages
            setTimeout(forceSkipLoader, 6500);
        });

        function loadGrid(cat) {
            const container = document.getElementById('product-grid');
            const filtered = products.filter(p => p.cat === cat);
            container.innerHTML = filtered.map(p => `
                <div class="item-card" onclick="addToCart('${p.name}', ${p.price})">
                    <img src="${p.img}" onerror="this.src='https://www.mcdonalds.com/is/image/content/dam/usa/nfl/nutrition/items/regular/hero/desktop/Big_Mac.png?\( Product_Desktop \)'">
                    <div class="name">${p.name}</div>
                    <div class="price">${p.price.toFixed(2)} €</div>
                </div>
            `).join('');
        }

        function updateView(cat, btn) {
            document.querySelectorAll('.nav-button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadGrid(cat);
        }

        function addToCart(name, price) {
            const existing = cart.find(i => i.name === name);
            if (existing) existing.qty++;
            else cart.push({name, price, qty: 1});
            updateCartUI();
        }

        function updateCartUI() {
            const total = cart.reduce((a, b) => a + b.price * b.qty, 0);
            document.getElementById('sum').innerText = total.toFixed(2);
            document.getElementById('item-count').innerText = cart.reduce((a, b) => a + b.qty, 0);
        }

        function showCart() {
            if (cart.length === 0) return alert("Panier vide !");
            alert("Panier :\n" + cart.map(i => `${i.qty}x ${i.name} - ${(i.price*i.qty).toFixed(2)}€`).join("\n") + `\n\nTotal : ${cart.reduce((a,b)=>a+b.price*b.qty,0).toFixed(2)}€`);
        }

        function pay() {
            if (cart.length === 0) return alert("Votre commande est vide !");
            const total = cart.reduce((a,b)=>a + b.price*b.qty, 0);
            document.getElementById('modal-total').innerText = total.toFixed(2);
            document.getElementById('payment-modal').style.display = 'flex';
        }

        function processPayment() {
            alert("✅ Paiement accepté !\n\nMerci pour votre commande 🍔\nPoints gagnés : +120");
            cart = [];
            updateCartUI();
            document.getElementById('payment-modal').style.display = 'none';
        }

        function formatCardNumber(input) {
            input.value = input.value.replace(/\s/g, '').replace(/(\d{4})/g, '$1 ').trim();
        }

        function formatExpiry(input) {
            input.value = input.value.replace(/[^0-9]/g, '').replace(/^(\d{2})/, '$1/');
        }

        console.log("%cBorne McDonald's complète chargée avec succès !", "color:#FFC72C; font-size:18px; font-weight:bold;");
    </script>
</body>
</html>

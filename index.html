<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Borne McDonald's • Commande Officielle</title>
    <style>
        :root {
            --mcd-green: #004731;
            --mcd-gold: #FFC72C;
            --mcd-bg: #F5F5F5;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--mcd-bg);
            margin: 0;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        .mcd-logo { height: 48px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }

        header {
            background: var(--mcd-green);
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .points-pill {
            background: rgba(255,255,255,0.15);
            border: 2px solid var(--mcd-gold);
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: 700;
            color: var(--mcd-gold);
        }

        .sidebar { width: 180px; background: white; border-right: 1px solid #ddd; overflow-y: auto; }
        .nav-button {
            padding: 22px 15px;
            text-align: center;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .nav-button.active { background: #fff9e6; border-left: 8px solid var(--mcd-gold); }
        .nav-button img { width: 52px; height: 52px; object-fit: contain; }

        .main-layout { display: flex; height: calc(100vh - 170px); }
        .grid {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 20px;
            background: white;
        }

        .item-card {
            border: 1px solid #eee;
            border-radius: 18px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s;
        }
        .item-card:hover {
            transform: translateY(-4px);
            border-color: var(--mcd-gold);
            box-shadow: 0 10px 25px rgba(255,199,44,0.25);
        }
        .item-card img { width: 100%; max-height: 165px; object-fit: contain; border-radius: 12px; }
        .item-card .name { font-weight: 700; margin: 12px 0 6px; min-height: 42px; }
        .item-card .price { color: var(--mcd-green); font-weight: 900; font-size: 1.35rem; }

        footer {
            height: 110px;
            background: var(--mcd-green);
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            color: white;
            z-index: 1000;
        }
        .checkout-btn {
            background: var(--mcd-gold);
            color: var(--mcd-green);
            padding: 18px 55px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1.35rem;
            border: none;
            cursor: pointer;
        }

        /* Modals */
        #payment-modal, #cart-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/McDonald%27s_logo.svg/512px-McDonald%27s_logo.svg.png" alt="McDonald's" class="mcd-logo">
        <div class="points-pill">⭐ <span id="p-count">248</span> points MyMcDo+</div>
    </header>

    <div class="main-layout">
        <nav class="sidebar">
            <div class="nav-button active" onclick="updateView('menu', this)"><img src="https://www.mcdonalds.fr/documents/10191/26895315/Big+Mac.png"><span>Menus</span></div>
            <div class="nav-button" onclick="updateView('burger', this)"><img src="https://www.mcdonalds.fr/documents/10191/26895315/Double_Cheese.png"><span>Burgers</span></div>
            <div class="nav-button" onclick="updateView('chicken', this)"><img src="https://www.mcdonalds.fr/documents/10191/26895315/McChicken.png"><span>Poulet & Poisson</span></div>
            <div class="nav-button" onclick="updateView('side', this)"><img src="https://www.mcdonalds.fr/documents/10191/26895315/Frites.png"><span>Accompagnements</span></div>
            <div class="nav-button" onclick="updateView('drink', this)"><img src="https://www.mcdonalds.fr/documents/10191/26895315/Coca.png"><span>Boissons</span></div>
            <div class="nav-button" onclick="updateView('dessert', this)"><img src="https://www.mcdonalds.fr/documents/10191/26895315/McFlurry.png"><span>Desserts</span></div>
            <div class="nav-button" onclick="updateView('mccafe', this)"><img src="https://www.mcdonalds.fr/documents/10191/26895315/Cafe.png"><span>McCafé</span></div>
            <div class="nav-button" onclick="updateView('promo', this)"><img src="https://www.mcdonalds.fr/documents/10191/26895315/SuperMario.png"><span>Promo</span></div>
        </nav>

        <main class="grid" id="product-grid"></main>
    </div>

    <footer>
        <div onclick="showCart()" style="cursor:pointer;">
            <div style="font-size:0.85rem; opacity:0.85;">TOTAL COMMANDE</div>
            <div style="font-size:2.1rem; font-weight:900;"><span id="sum">0.00</span> €</div>
        </div>
        <button class="checkout-btn" onclick="pay()">PAYER • <span id="item-count">0</span> articles</button>
    </footer>

    <!-- Modals (paiement + panier) -->
    <div id="payment-modal" style="display:none;">
        <!-- Contenu du paiement (simplifié) -->
        <div style="background:white; width:92%; max-width:420px; border-radius:20px; margin:auto; padding:20px;">
            <h2 style="text-align:center;">Paiement sécurisé</h2>
            <p>Total : <strong id="modal-total">0.00</strong> €</p>
            <input type="text" id="card-number" placeholder="Numéro de carte" style="width:100%; padding:12px; margin:10px 0;" oninput="formatCardNumber(this)">
            <button onclick="processPayment()" style="width:100%; padding:15px; background:var(--mcd-green); color:white; border:none; border-radius:50px; font-size:1.2rem;">PAYER</button>
        </div>
    </div>

    <script>
        const products = [
            { name: "Menu Super Mario Galaxy Le Film", cat: "menu", price: 12.90, img: "https://www.mcdonalds.fr/documents/10191/26895315/SuperMario.png" },
            { name: "Menu Big Mac™ Best Of", cat: "menu", price: 11.80, img: "https://www.mcdonalds.fr/documents/10191/26895315/Big+Mac.png" },
            { name: "Menu McChicken™ Best Of", cat: "menu", price: 11.70, img: "https://www.mcdonalds.fr/documents/10191/26895315/McChicken.png" },
            { name: "Menu Royal Cheese™ Best Of", cat: "menu", price: 12.10, img: "https://www.mcdonalds.fr/documents/10191/26895315/Royal_Cheese.png" },
            { name: "Menu CBO™ Best Of", cat: "menu", price: 12.50, img: "https://www.mcdonalds.fr/documents/10191/26895315/CBO.png" },
            { name: "Big Mac™", cat: "burger", price: 6.20, img: "https://www.mcdonalds.fr/documents/10191/26895315/Big+Mac.png" },
            { name: "Double Cheeseburger", cat: "burger", price: 4.80, img: "https://www.mcdonalds.fr/documents/10191/26895315/Double_Cheese.png" },
            { name: "McChicken™", cat: "burger", price: 5.70, img: "https://www.mcdonalds.fr/documents/10191/26895315/McChicken.png" },
            { name: "Frites Moyennes", cat: "side", price: 3.20, img: "https://www.mcdonalds.fr/documents/10191/26895315/Frites.png" },
            { name: "Coca-Cola Original", cat: "drink", price: 2.95, img: "https://www.mcdonalds.fr/documents/10191/26895315/Coca.png" },
            { name: "McFlurry™ Oreo", cat: "dessert", price: 3.90, img: "https://www.mcdonalds.fr/documents/10191/26895315/McFlurry.png" }
        ];

        let cart = [];
        let myPoints = 248;

        // Chargement direct
        window.onload = () => {
            loadGrid('menu');
        };

        function loadGrid(cat) {
            const container = document.getElementById('product-grid');
            const filtered = products.filter(p => p.cat === cat);
            container.innerHTML = filtered.map(p => `
                <div class="item-card" onclick="addToCart('${p.name}', ${p.price})">
                    <img src="${p.img}">
                    <div class="name">${p.name}</div>
                    <div class="price">${p.price.toFixed(2)} €</div>
                </div>
            `).join('');
        }

        function updateView(cat, btn) {
            document.querySelectorAll('.nav-button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadGrid(cat);
        }

        function addToCart(name, price) {
            const existing = cart.find(i => i.name === name);
            if (existing) existing.qty++;
            else cart.push({name, price, qty: 1});
            updateCartUI();
        }

        function updateCartUI() {
            const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
            document.getElementById('sum').innerText = total.toFixed(2);
            document.getElementById('item-count').innerText = cart.reduce((sum, item) => sum + item.qty, 0);
        }

        function showCart() {
            if (cart.length === 0) return alert("Panier vide !");
            alert(cart.map(i => `${i.qty}x ${i.name}`).join("\n") + `\n\nTotal : ${cart.reduce((s,i)=>s + i.price*i.qty,0).toFixed(2)} €`);
        }

        function pay() {
            if (cart.length === 0) return alert("Commande vide !");
            const total = cart.reduce((s,i)=>s + i.price*i.qty,0);
            document.getElementById('modal-total').innerText = total.toFixed(2);
            document.getElementById('payment-modal').style.display = 'flex';
        }

        function processPayment() {
            alert("✅ Paiement réussi ! Bon appétit 🍔");
            cart = [];
            updateCartUI();
            document.getElementById('payment-modal').style.display = 'none';
        }

        function formatCardNumber(input) {
            input.value = input.value.replace(/\s/g, '').replace(/(\d{4})/g, '$1 ').trim();
        }

        console.log('%cBorne McDonald\'s prête - sans chargement', 'color:#FFC72C; font-size:16px;');
    </script>
</body>
</html>
